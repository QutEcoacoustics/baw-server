name: Run tests, publish docker image

on:
  push:
    paths-ignore:
      - "swagger/**"

env:
  IMAGE_NAME: workbench-server-ci
  ANALYSIS_IMAGE_NAME: workbench-server-pbs-ci
  DOCKER_BUILDKIT: 1
  REGISTRY: ghcr.io
  TEST_BUCKETS: 16

permissions:
  contents: read
  packages: write

jobs:
  # Generate test matrix dynamically by dividing spec files into buckets
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate test matrix
        id: set-matrix
        run: |
          ruby generate-test-matrix.rb | tee /dev/stderr | jq -c '.' | xargs -I {} echo "matrix={}" >> $GITHUB_OUTPUT

      - name: Upload test bucket files
        uses: actions/upload-artifact@v7
        with:
          name: test-buckets
          path: test-bucket-*.txt

  # Build the Docker image and save it as an artifact
  build:
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Cached LFS checkout
        uses: nschloe/action-cached-lfs-checkout@v1.2.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}//${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.description=[DO NOT USE!] The acoustic workbench server for storing and managing ecoacoustic data. This is a CI caching artifact only and it contains test and development dependecies not suitable for production.
          tags: |
            type=raw,value={{branch}}-{{sha}}-ci
            type=ref,event=pr

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            trimmed=false

  # Build the analysis_test Docker image and push it to the registry
  build_analysis_image:
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Cached LFS checkout
        uses: nschloe/action-cached-lfs-checkout@v1.2.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.ANALYSIS_IMAGE_NAME }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.description=[DO NOT USE!] A PBS server and client used for testing PBS integration with the acoustic workbench server. This is a CI caching artifact only.
            org.opencontainers.image.licenses=None
            org.opencontainers.image.title=worbench-server-pbs
          tags: |
            type=raw,value={{branch}}-{{sha}}-ci
            type=ref,event=pr

      - name: Build and push analysis test Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: provision/analysis
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=analysis
          cache-to: type=gha,mode=max,scope=analysis

  # Test jobs that run in parallel using the built image
  test:
    needs: [build, generate-matrix, build_analysis_image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml

    steps:
      - name: Cached LFS checkout
        uses: nschloe/action-cached-lfs-checkout@v1.2.3

      - name: Download test bucket files
        uses: actions/download-artifact@v8
        with:
          name: test-buckets

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image
        run: echo "tag=$(echo '${{ needs.build.outputs.image-tags }}' | head -n1)" >> $GITHUB_OUTPUT

      - name: Set analysis image tag
        id: analysis_image
        run: echo "tag=$(echo '${{ needs.build_analysis_image.outputs.image-tags }}' | head -n1)" >> $GITHUB_OUTPUT

      - name: Fix permissions for bind mounts
        # Ensure all repository files are owned by baw_web (UID 1000) so containers can access them
        # Restore .git ownership to runner after chown to prevent git config lock errors in cleanup
        run: |
          sudo chown -R 1000:1000 .
          sudo chown -R "$(id -u):$(id -g)" .git

      - name: Start services
        env:
          CI_IMAGE: ${{ steps.image.outputs.tag }}
          CI_ANALYSIS_IMAGE: ${{ steps.analysis_image.outputs.tag }}
        run: |
          echo "Using image: $CI_IMAGE"
          echo "Using analysis image: $CI_ANALYSIS_IMAGE"
          docker compose --profile test up --detach --wait --timeout 120

      - name: Debugging
        env:
          CI_IMAGE: ${{ steps.image.outputs.tag }}
          CI_ANALYSIS_IMAGE: ${{ steps.analysis_image.outputs.tag }}
        run: |
          docker compose ps
          docker ps
        if: ${{ always() }}

      - name: Copy specs to run
        run: |
          docker cp test-bucket-${{ matrix.bucket }}.txt $(docker compose ps -q web):/home/baw_web/baw-server/test-files.txt

      - name: Run bucket ${{ matrix.bucket }} tests
        id: run_tests
        continue-on-error: true
        env:
          CI_IMAGE: ${{ steps.image.outputs.tag }}
          CI_ANALYSIS_IMAGE: ${{ steps.analysis_image.outputs.tag }}
        run: |
          docker compose exec -T web bash -c '
            # Ensure test dependencies are installed
            bundle config set with test
            bundle install

            if [ -f /home/baw_web/baw-server/test-files.txt ]; then
              cat /home/baw_web/baw-server/test-files.txt | xargs rspec --format progress --format html --out rspec_results_bucket_${{ matrix.bucket }}.html
            else
              echo "No test files found for bucket ${{ matrix.bucket }}"
              exit 1
            fi
          '

      - name: Retry failed tests in bucket ${{ matrix.bucket }}
        if: steps.run_tests.outcome == 'failure'
        env:
          CI_IMAGE: ${{ steps.image.outputs.tag }}
        run: |
          docker compose exec -T web bash -c '
            rspec --only-failures --format progress --format html --out rspec_results_bucket_${{ matrix.bucket }}_retry.html
            RETRY_EXIT_CODE=$?

            if [ $RETRY_EXIT_CODE -eq 0 ]; then
              echo "::notice::Tests passed on retry - possible flaky tests in bucket ${{ matrix.bucket }}"
            fi

            exit $RETRY_EXIT_CODE
          '

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: rspec-test-results-bucket-${{ matrix.bucket }}
          path: rspec_results_bucket_${{ matrix.bucket }}*.html

      - name: Upload test logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-logs-bucket-${{ matrix.bucket }}
          path: log/*test.log

      - name: Stop services
        env:
          CI_IMAGE: ${{ steps.image.outputs.tag }}
          CI_ANALYSIS_IMAGE: ${{ steps.analysis_image.outputs.tag }}
        if: always()
        run: docker compose down

  # Determine whether a new release is needed based on conventional commits since the last tag.
  # Dependabot and all chore: commits are excluded from triggering a release.
  check_version:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.actor != 'dependabot[bot]'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history required so the version action can locate the last tag
          fetch-depth: 0

      - name: Calculate next version from conventional commits
        id: version
        uses: PaulHatch/semantic-version@f29500c9d60a99ed5168e39ee367e0976884c46e # v6.0.1
        with:
          # Match existing tag format (e.g. 14.8.0, not v14.8.0)
          tag_prefix: ""
          # Detect breaking changes via ! or BREAKING CHANGE:
          major_pattern: "/!:|BREAKING CHANGE:/"
          # Detect new features
          minor_pattern: "/feat(\\(.+\\))?:/"
          # Ignore chore(ci) and chore(deps) commits — dependabot updates are not release-worthy
          ignore_commits_pattern: "/^chore/"
          # Search commit body for BREAKING CHANGE footers
          search_commit_body: true

      - name: Determine if release is needed
        id: check
        run: |
          if [ "${{ steps.version.outputs.version_type }}" != "none" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  # Push release with version, changelog, docs, tag, and image (only on master when a release is warranted)
  publish:
    needs: [build, test, build_analysis_image, check_version]
    runs-on: ubuntu-latest
    if: needs.check_version.result == 'success' && needs.check_version.outputs.should_release == 'true'

    permissions:
      contents: write
      packages: write

    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml

    steps:
      - name: Cached LFS checkout
        uses: nschloe/action-cached-lfs-checkout@v1.2.3
        with:
          fetch-depth: 200

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image
        run: echo "tag=$(echo '${{ needs.build.outputs.image-tags }}' | head -n1)" >> $GITHUB_OUTPUT

      - name: Set analysis image tag
        id: analysis_image
        run: echo "tag=$(echo '${{ needs.build_analysis_image.outputs.image-tags }}' | head -n1)" >> $GITHUB_OUTPUT

      - name: Fix permissions for bind mounts
        run: |
          sudo chown -R 1000:1000 .
          sudo chown -R "$(id -u):$(id -g)" .git

      - name: Start services
        env:
          CI_IMAGE: ${{ steps.image.outputs.tag }}
          CI_ANALYSIS_IMAGE: ${{ steps.analysis_image.outputs.tag }}
        run: docker compose --profile test up --detach --wait --timeout 120

      - name: Ensure gems are installed
        run: |
          docker compose exec -T -e RAILS_ENV=development web bash -c 'bundle check || bundle install'

      - name: Generate changelog
        env:
          CI_IMAGE: ${{ steps.image.outputs.tag }}
          CI_ANALYSIS_IMAGE: ${{ steps.analysis_image.outputs.tag }}
          CHANGELOG_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_VERSION: ${{ needs.check_version.outputs.version }}
        run: |
          docker compose exec -T \
            -e RAILS_ENV=development \
            -e NEXT_VERSION \
            -e CHANGELOG_GITHUB_TOKEN \
            web rake changelog

      - name: Generate API docs
        env:
          CI_IMAGE: ${{ steps.image.outputs.tag }}
          CI_ANALYSIS_IMAGE: ${{ steps.analysis_image.outputs.tag }}
        run: docker compose exec -T web generate_docs.sh

      - name: Stop services
        env:
          CI_IMAGE: ${{ steps.image.outputs.tag }}
          CI_ANALYSIS_IMAGE: ${{ steps.analysis_image.outputs.tag }}
        if: always()
        run: docker compose down

      - name: Set VERSION and commit changes
        run: |
          # we chowned all the files 😮‍💨
          # don't want to change them back though because we're about to build the container again in the following steps
          sudo setpriv --reuid=1000 --regid=1000 --clear-groups bash -c 'echo "${{ needs.check_version.outputs.version }}" > VERSION'
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: generate changelog and API docs for ${{ needs.check_version.outputs.version }}" -m "[skip ci]"

      - name: Create and push tag
        run: |
          git tag -a -m "Version ${{ needs.check_version.outputs.version }}" "${{ needs.check_version.outputs.version }}"
          git push --follow-tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: atruskie
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push to DockerHub
        uses: docker/build-push-action@v7
        with:
          build-args: |
            trimmed=true
            version=${{ needs.check_version.outputs.version }}
          context: .
          push: true
          tags: qutecoacoustics/workbench-server:${{ needs.check_version.outputs.version }},qutecoacoustics/workbench-server:latest
          labels: |
            org.opencontainers.image.title=Acoustic Workbench Server
            org.opencontainers.image.description=The ecoacoustics workbench server. Manages the structure and metadata for environmental audio data.
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.check_version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=Open Ecoacoustics
            org.opencontainers.image.authors=Anthony Truskinger, Philip Eichinski, Andrew Schwenke, and contributors
            org.opencontainers.image.licenses=Apache-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
