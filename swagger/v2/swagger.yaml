        Note: accessing a list/index/filter endpoint may return no results due to project permissions
      responses:
        '200':
          description: successful
          content:
            application/json:
              example:
                meta:
                  status: 200
                  message: OK
                  projection:
                    only:
                    - id
                    - audio_recording_id
                    - start_time_seconds
                    - end_time_seconds
                    - low_frequency_hertz
                    - high_frequency_hertz
                    - is_reference
                    - creator_id
