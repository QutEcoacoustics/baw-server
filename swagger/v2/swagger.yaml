                    - created_at
                    - audio_event_import_file_id
                    - import_file_index
                    - provenance_id
                    - channel
                    - score
                    - taggings
                  sorting:
                    order_by: created_at
                    direction: desc
                  paging:
                    page: 1
                    items: 25
                    total: 1
                    max_page: 1
                    current: http://web:3000/audio_events/filter?direction=desc&items=25&order_by=created_at&page=1
                    previous: 
                    next: 
                data:
                - id: 1
                  audio_recording_id: 1
                  start_time_seconds: 5.2
                  end_time_seconds: 5.8
                  low_frequency_hertz: 400.0
                  high_frequency_hertz: 6000.0
                  is_reference: false
                  creator_id: 4
                  updated_at: '2020-01-02T03:04:05.677Z'
                  created_at: '2020-01-02T03:04:05.677Z'
                  audio_event_import_file_id: 1
                  import_file_index: 
                  provenance_id: 
                  channel: 
                  score: 
