servers:
- url: "{protocol}://{authority}"
  variables:
    authority:
      default: localhost:3000
    protocol:
      enum:
      - http
      - https
      default: http
components:
  securitySchemes:
    auth_token_header:
      type: apiKey
      description: |
        The api auth_token placed in the 'Authorization' header.
        Example:

        ```
        Token token="xxxxxxxxxx"
        ```

        Where the your auth_token is substituted into the placeholder.
      in: header
      name: Authorization
      scheme: Token
    auth_token_query_string:
      type: apiKey
      name: user_token
      in: query_string
    cookie:
      type: apiKey
      name: cookie
      scheme: apiKey
      in: header
    jwt:
      type: bearer
      name: Authorization
      in: header
  schemas:
    id:
      type: integer
      minimum: 0
      readOnly: true
    nullableId:
      type:
      - integer
      - 'null'
      minimum: 0
      readOnly: true
    timezone_information:
      anyOf:
      - type: object
        properties:
          identifier_alt:
            type:
            - string
            - 'null'
          identifier:
            type: string
          friendly_identifier:
            type: string
          utc_offset:
            type: string
          utc_total_offset:
            type: integer
      - type: 'null'
    image_urls:
      type: array
      items:
        type: object
        properties:
          size:
            type: string
          url:
            type: string
            format: URI
          width:
            type: integer
            nullable: true
          height:
            type: integer
            nullable: true
    permission_levels:
      type: string
      nullable: true
      enum:
      - owner
      - writer
      - reader
      - 
    meta:
      properties:
        capabilities:
          type: object
          items:
            type: object
            properties:
              can:
                type:
                - 'null'
                - boolean
              details:
                type: string
            required:
            - can
      type: object
    meta_error:
      type: object
      properties:
        error:
          type: object
          additionalProperties: false
          properties:
            details:
              description: A human readable description of the error
              type: string
            info:
              description: Freeform additional information about the error
              type:
              - 'null'
              - object
              - string
              - array
            links:
              type: object
              items:
                type: object
                properties:
                  text:
                    type: string
                  url:
                    type: string
              required:
              - text
        required:
        - error
    standard_response:
      type: object
      additionalProperties: false
      properties:
        meta:
          "$ref": "#/components/schemas/meta"
        data:
          oneOf:
          - type: array
          - type: object
      required:
      - meta
      - data
    error_response:
      type: object
      additionalProperties: false
      properties:
        meta:
          allOf:
          - "$ref": "#/components/schemas/meta"
          - "$ref": "#/components/schemas/meta_error"
        data:
          type: 'null'
      required:
      - meta
      - data
    filter_payload_filter:
      type: object
    filter_payload_paging:
      type: object
      properties:
        items:
          type: integer
          minimum: 1
        page:
          type: integer
          minimum: 1
        disable_paging:
          type: boolean
    filter_payload_sort:
      type: object
      properties:
        order_by:
          type: string
        direction:
          type: string
          enum:
