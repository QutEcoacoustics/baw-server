  "/reports/tag_frequency":
    post:
      summary: Gets event frequency per tag across time buckets
      tags:
      - reports
      description: |
        Returns event frequency per tag across time buckets.
        The `options` parameter specifies the bucket size (day, week, month, or year).
        The optional `filter` parameter is applied to audio events.
        Results only include audio events the user has reader access to.
      parameters: []
      security:
      - auth_token_header: []
      responses:
        '422':
          description: rejects missing options
          content:
            application/json:
              example:
                meta:
                  status: 422
                  message: Unprocessable Content
                  error:
                    details: 'The request could not be understood: param is missing
                      or the value is empty or invalid: options'
                data: 
        '200':
          description: tag frequency report retrieved
          content:
            application/json:
              example:
                meta:
                  status: 200
                  message: OK
                  filter:
                    tags.id:
                      eq: 78
                data:
                - bucket:
                  - '2000-06-30T00:00:00.000Z'
                  - '2000-07-01T00:00:00.000Z'
                  tags:
                  - events: 1
                    tag_id: 80
              schema:
                allOf:
                - "$ref": "#/components/schemas/standard_response"
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        additionalProperties: false
                        properties:
                          bucket:
                            type: array
                            items:
                              type: string
                              format: date-time
                            minItems: 2
                            maxItems: 2
                            additionalItems: false
                            description: The start and end of the time bucket as an
                              ISO8601 interval string
                          tags:
                            type: array
                            items:
                              type: object
                              additionalProperties: false
                              properties:
                                tag_id:
                                  type:
                                    "$ref": "#/components/schemas/id"
                                    readOnly: true
                                events:
                                  type: integer
                                  description: The number of events with the given
                                    tag in the bucket
                          readOnly: true
                        required:
                        - bucket
                        - tags
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  "$ref": "#/components/schemas/filter_payload_filter"
                sort: 
                page: 
                projection: 
                options:
                  allOf:
                  - "$ref": "#/components/schemas/filter_payload_options"
                  - type: object
                    properties:
                      bucket_size:
                        type: string
                        enum:
                        - day
                        - week
                        - month
                        - year
                    required:
                    - bucket_size
              required:
              - options
        required: true
