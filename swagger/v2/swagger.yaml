  "/reports/tag_accumulation":
    post:
      summary: Gets cumulative unique tag counts over time buckets
      tags:
      - reports
      description: |
        Returns cumulative unique tag counts bucketed by a time interval.
        The `options` parameter specifies the bucket size (day, week, month, or year).
        The optional `filter` parameter is applied to audio events.
        Results only include audio events the user has reader access to.
      parameters: []
      security:
      - auth_token_header: []
      responses:
        '422':
          description: rejects projection parameters
          content:
            application/json:
              example:
                meta:
                  status: 422
                  message: Unprocessable Content
                  error:
                    details: 'The request could not be understood: Paging, sorting,
                      and projection parameters are not allowed in group by or reporting
                      requests.'
                data: 
        '200':
          description: filters audio events by tag
          content:
            application/json:
              example:
                meta:
                  status: 200
                  message: OK
                  filter:
                    tags.id:
                      eq: 67
                data:
                - bucket:
                  - '2000-06-12T00:00:00.000Z'
                  - '2000-06-13T00:00:00.000Z'
                  cumulative_unique_tag_count: 1.0
              schema:
                allOf:
                - "$ref": "#/components/schemas/standard_response"
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        additionalProperties: false
                        properties:
                          bucket:
                            type: array
                            items:
                              type: string
                              format: date-time
                            minItems: 2
                            maxItems: 2
                            additionalItems: false
                            description: The start and end of the time bucket as an
                              ISO8601 interval string
                          cumulative_unique_tag_count:
                            type: number
                        readOnly: true
                        required:
                        - bucket
                        - cumulative_unique_tag_count
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  "$ref": "#/components/schemas/filter_payload_filter"
                sort: 
                page: 
                projection: 
                options:
                  allOf:
                  - "$ref": "#/components/schemas/filter_payload_options"
                  - type: object
                    properties:
                      bucket_size:
                        type: string
                        enum:
                        - day
                        - week
                        - month
                        - year
                    required:
                    - bucket_size
              required:
              - options
        required: true
