  "/audio_events/filter":
    post:
      summary: filter audio_event
      security:
      - auth_token_header: []
      parameters: []
      tags:
      - audio_events
      description: |2

        Users that can invoke this route: `Admin`, `owner user`, `writer`, `reader`, `no_access`, `anyone`.<br />
